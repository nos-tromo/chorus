name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v2.8 (strict-config + make/common.mk + frontend eslint.config.js
    # drift-checks; nos-tromo style tuning: line-length=120, ANN401 ignored,
    # local mypy hook). Canonical configs at
    # nos-tromo/.github/configs/{python-strict,make-common,frontend-eslint}/.
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v2.9
    with:
      python-versions: '["3.11","3.12","3.13"]'
      uv-sync-args: '--frozen'
      docker-build: true
      frontend-build: true
      frontend-dir: 'frontend'
      frontend-lint: true
      node-version: '20'
      pnpm-version: '9.12.0'

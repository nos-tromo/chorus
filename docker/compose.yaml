### chorus app compose — app services only.
###
### Graph state lives in the data-plane compose project (Neo4j); chorus's
### own state (audit log, raw store, operational logs) lives in the
### external `chorus-state` volume mounted at $CHORUS_HOME. Both are
### `external: true` so `docker compose down -v` in this project is
### always safe — only `docker volume rm` against the named volume can
### destroy chorus-local state. See docs/architecture.md.

name: chorus

##########################################################
# Shared logging — the local driver rotates and compresses
# per-container; tail with `docker compose logs -f <svc>`.
##########################################################
x-logging: &default-logging
  driver: "local"
  options:
    max-size: "50m"
    max-file: "5"
    compress: "true"

services:
  backend:
    image: chorus-backend:${CHORUS_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    logging: *default-logging
    env_file:
      - path: ../.env
        required: false
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-http://vllm-router:4000/v1}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CHORUS_HOME: ${CHORUS_HOME:-/var/lib/chorus}
    volumes:
      - chorus-state:/var/lib/chorus
    networks:
      chorus-net:
        aliases:
          - backend
      inference-net:
        aliases:
          - chorus-backend
      data-net:
        aliases:
          - chorus-backend
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: chorus-frontend:${CHORUS_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    logging: *default-logging
    environment:
      CHORUS_API_URL: http://backend:8000
      CHORUS_UI_IDENTITY: dev
    depends_on:
      backend:
        condition: service_healthy
    networks:
      chorus-net:
        aliases:
          - frontend
    expose:
      - "8501"
    restart: unless-stopped

networks:
  chorus-net: {}
  inference-net:
    external: true   # owned by the vllm-service compose project
  data-net:
    external: true   # owned by the data-plane compose project

volumes:
  chorus-state:
    external: true 
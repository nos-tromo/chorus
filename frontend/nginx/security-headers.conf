# Shared security headers. Included from every location block that itself sets
# any header (because add_header at server scope is dropped once a location
# defines its own headers — nginx replaces, never merges).

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
# CSP for a Vite SPA: all assets (JS, CSS, fonts via @fontsource) are same-origin
# bundles — no external script, style, or font origins needed.
# 'unsafe-inline' on style-src is required for Cytoscape.js, which injects inline
# styles for node/edge rendering; all other directives are locked to 'self'.
# connect-src 'self' covers all API calls (same origin via this nginx proxy).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
